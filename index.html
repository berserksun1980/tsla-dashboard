<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encrypted Dashboard</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; }
        .vault-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }

</head>

    <div class="absolute top-1/3 right-1/4 w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>
    <div class="absolute bottom-1/4 left-1/2 w-96 h-96 bg-emerald-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-4000"></div>

    <div class="vault-card p-8 rounded-2xl shadow-2xl w-96 text-center z-10 relative">
        <div class="w-16 h-16 mx-auto mb-6 bg-slate-800 rounded-full flex items-center justify-center border border-slate-700 shadow-inner">

            </svg>
        </div>
        <h2 class="text-2xl font-bold mb-2 text-white">Secure Vault</h2>
        <p class="text-sm text-slate-400 mb-8">Enter password to view your TSLA Dashboard</p>
        
        <input type="password" id="pwd" class="w-full bg-slate-900 border border-slate-700 text-white px-4 py-3 rounded-lg mb-6 focus:outline-none focus:border-blue-500 input-glow transition-all" placeholder="Enter password" onkeypress="if(event.key === 'Enter') unlock()">
        
        <button onclick="unlock()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-semibold py-3 rounded-lg hover:from-blue-500 hover:to-indigo-500 transition-all shadow-lg transform hover:-translate-y-0.5">Unlock Dashboard</button>
        
        <p id="err" class="text-red-400 text-sm mt-4 hidden bg-red-900/30 py-2 rounded border border-red-800/50">Incorrect password.</p>
    </div>

            const pwd = document.getElementById('pwd').value;
